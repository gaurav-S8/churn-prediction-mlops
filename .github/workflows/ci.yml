# CI/CD Pipeline
name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy/render

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: test-api-key
        run: pytest tests/test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  deploy-hf-space:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push streamlit_app to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone HF Space
          git clone https://gaurav-S8:$HF_TOKEN@huggingface.co/spaces/gaurav-S8/churn-prediction-mlops hf_space

          # Copy streamlit_app contents into HF Space
          cp -r streamlit_app/* hf_space/

          # Push to HF
          cd hf_space
          git add .
          git commit -m "Sync streamlit app from GitHub Actions" || echo "Nothing to commit"
          git push